services:
  db:
    image: postgres:16-alpine
    container_name: audentify-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-audentify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-audentify_dev}
      POSTGRES_DB: ${POSTGRES_DB:-audentify_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-audentify} -d ${POSTGRES_DB:-audentify_dev}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
